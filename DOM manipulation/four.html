<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chai aur code</title>
</head>
<body style="background-color: #212121; color: white;">
    <ul class="language">
        <li>javascript</li>

    </ul>

</body>
<script>
    function addlanguage(langname){
        const li=document.createElement('li')
        li.innerHTML=`${langname}`
        document.querySelector('.language').appendChild(li)

    }
    // addlanguage("python")
    
    function addoptilanguage(langname){
        const li=document.createElement('li')
        li.appendChild(document.createTextNode(langname))
        document.querySelector('.language').appendChild(li)

    }
    const arr=["cpp","java","c#","golang","ruby"]
    arr.forEach(function(it){
        addoptilanguage(it)

    })
// edit
    const seclang=document.querySelector("li:nth-child(2)")
    // seclang.innerHTML="Mojo"
    const li=document.createElement('li')
    li.appendChild(document.createTextNode("mojo"))
    seclang.replaceWith(li)
    //edit
    const firstlang=document.querySelector('li:first-child')
    const nli=document.createElement('li')
    nli.appendChild(document.createTextNode("typescript"))
    firstlang.replaceWith(nli)
    // last element edit
    const lastlang=document.querySelector('li:last-child')
    const newli=document.createElement('li')
    newli.appendChild(document.createTextNode("javascript"))
    lastlang.replaceWith(newli)
    // remove
    const last=document.querySelector('li:last-child')
    last.remove()
    



</script>
</html>
